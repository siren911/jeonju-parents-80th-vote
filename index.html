<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- viewport-fit=cover: 노치/홈 인디케이터 safe-area 대응에 필요 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- 라이트 모드 고정: 시스템 다크모드에서도 색상이 뒤집히지 않게 한다 -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#FAF7F0" />

    <title>우리 가족 팔순 식사 투표</title>
    <meta name="description" content="부모님 팔순 가족 식사 장소를 함께 고르는 투표입니다. 전주 식당 후보를 보고 가고 싶은 곳 세 군데를 골라주세요." />

    <!--
      ┌─────────────────────────────────────────────────────────────────┐
      │ 카카오톡 공유 미리보기(OG) 설정                                  │
      │                                                                 │
      │ 카카오톡 스크래퍼는 JavaScript를 실행하지 않으므로 OG 태그는     │
      │ 이 정적 index.html 안에 직접 있어야 한다.                        │
      │                                                                 │
      │ og:image 와 og:url 은 반드시 "절대 URL" 이어야 한다.            │
      │ 상대 경로(./og-image.png)를 쓰면 미리보기 이미지가 뜨지 않는다.  │
      │                                                                 │
      │ ★ 배포 후 아래 두 곳의 도메인을 실제 주소로 교체하세요.          │
      │   예) https://hong-gildong.github.io/jeonju-parents-80th-vote   │
      │   자세한 방법은 README.md "카카오톡 공유 미리보기" 항목 참고     │
      └─────────────────────────────────────────────────────────────────┘
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="우리 가족 팔순 식사 투표" />
    <meta property="og:title" content="우리 가족의 소중한 팔순 식사, 함께 골라요" />
    <meta property="og:description" content="전주 식당 후보를 보고 가고 싶은 곳 세 군데에 투표해 주세요." />
    <meta property="og:url" content="https://siren911.github.io/jeonju-parents-80th-vote/" />
    <meta property="og:image" content="https://siren911.github.io/jeonju-parents-80th-vote/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="우리 가족의 소중한 팔순 식사, 함께 골라요" />
    <meta name="twitter:description" content="전주 식당 후보를 보고 가고 싶은 곳 세 군데에 투표해 주세요." />
  </head>
  <body>
    <div id="root"></div>
    <noscript>이 투표 화면을 보려면 브라우저에서 자바스크립트를 켜주세요.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
