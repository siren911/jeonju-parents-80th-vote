name: Deploy to GitHub Pages

# main 브랜치 push 시 자동 실행 + Actions 탭에서 수동 실행 가능
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 중복 실행 방지 (연속 push 시 마지막 것만 배포)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # ★ vitest는 기본이 watch 모드이므로 package.json에서 "vitest run"으로 정의되어 있어야
        #   이 단계가 멈추지 않는다.
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # 공개 가능한 빌드 값은 Repository Variables/Secrets로 주입한다.
          # (Settings → Secrets and variables → Actions → Variables)
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_EVENT_SLUG: ${{ vars.VITE_EVENT_SLUG }}
          VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
