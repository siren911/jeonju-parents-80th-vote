<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="팔순 잔치 즐거운 가족 잔치">
  <rect width="1200" height="630" fill="#faf7f0"/>
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="#ffffff" stroke="#e8e2d6" stroke-width="2"/>

  <!-- 상단 장식선 -->
  <rect x="556" y="120" width="88" height="4" rx="2" fill="#cbb27c"/>

  <!-- 메인 타이틀 -->
  <text x="600" y="285" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="120" font-weight="800" fill="#22262b" letter-spacing="4">팔순 잔치</text>

  <!-- 부제 -->
  <text x="600" y="380" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="46" font-weight="600" fill="#8f7031" letter-spacing="6">전주 · 20명</text>

  <!-- 태그라인 -->
  <text x="600" y="470" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="40" font-weight="500" fill="#5a6069" letter-spacing="4">즐거운 가족 잔치</text>

  <!-- 하단 장식선 -->
  <rect x="556" y="512" width="88" height="4" rx="2" fill="#cbb27c"/>
